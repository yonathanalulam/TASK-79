services:
  test-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fleet
      POSTGRES_PASSWORD: fleet
      POSTGRES_DB: fleetcommerce_test
    ports:
      - "5434:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleet -d fleetcommerce_test"]
      interval: 2s
      timeout: 5s
      retries: 15

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      FLEET_TEST_DB: "postgres://fleet:fleet@test-db:5432/fleetcommerce_test?sslmode=disable"
      CGO_ENABLED: "0"
    depends_on:
      test-db:
        condition: service_healthy
